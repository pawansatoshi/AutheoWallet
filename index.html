<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional EVM Wallet - Autheo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #0d1117; color: #c9d1d9; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: auto; background: #161b22; padding: 20px; border-radius: 10px; border: 1px solid #30363d; }
        header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .logo { height: 40px; }
        button { background-color: #238636; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        button:hover { background-color: #2ea043; }
        button:disabled { background-color: #23863680; cursor: not-allowed; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 5px; box-sizing: border-box; }
        .section { margin-top: 20px; padding-top: 20px; border-top: 1px solid #30363d; }
        .ledger-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        .ledger-table th, .ledger-table td { border: 1px solid #30363d; padding: 8px; text-align: left; word-break: break-all; }
        #qrcode { margin-top: 15px; display: flex; justify-content: center; background: white; padding: 10px; border-radius: 5px; width: fit-content; margin-left: auto; margin-right: auto;}
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="logo.png" alt="Official Logo" class="logo" onerror="this.style.display='none';">
        <h2 style="margin: 0;">Autheo Wallet</h2>
    </header>

    <button id="connectBtn" onclick="connectWallet()">Connect MetaMask / OKX</button>
    <p id="status">Status: Disconnected</p>
    <h3 id="balanceDisplay">Balance: 0.00 THEO</h3>

    <div class="section">
        <h3>Send THEO</h3>
        <input type="text" id="recipient" placeholder="Recipient Address (0x...)">
        <input type="number" id="amount" placeholder="Amount (THEO)">
        <button id="sendBtn" onclick="sendTransaction()" disabled>Send Funds</button>
    </div>

    <div class="section">
        <h3>Receive THEO</h3>
        <p id="userAddress" style="font-size: 12px; word-break: break-all;">Address: Not Connected</p>
        <div id="qrcode"></div>
    </div>

    <div class="section">
        <h3>Deploy Autheo Smart Contract</h3>
        <p style="font-size: 12px; color: #8b949e;">Deploy a Multi-Send utility contract directly to the Autheo Testnet.</p>
        <button id="deployBtn" onclick="deployContract()" disabled>Deploy BatchSender Contract</button>
        <p id="contractAddress" style="font-size: 12px; margin-top: 10px; color: #58a6ff;"></p>
    </div>

    <div class="section">
        <h3>Ledger History</h3>
        <table class="ledger-table" id="ledgerTable">
            <tr>
                <th>Txn Hash</th>
                <th>Time Took</th>
                <th>Gas Fee</th>
                <th>Status</th>
            </tr>
        </table>
    </div>
</div>

<script>
    let provider;
    let signer;
    let userAddressStr = "";

    // Autheo Testnet Configuration
    const autheoNetwork = {
        chainId: '0x311', // 785 in hex
        chainName: 'Autheo Testnet',
        nativeCurrency: { name: 'THEO', symbol: 'THEO', decimals: 18 },
        rpcUrls: ['https://testnet-rpc1.autheo.com'],
        blockExplorerUrls: ['https://testnet-explorer.autheo.com']
    };

    // Compiled Contract Data
    const CONTRACT_ABI = [
        {
            "anonymous": false,
            "inputs": [
                { "indexed": true, "internalType": "address", "name": "sender", "type": "address" },
                { "indexed": false, "internalType": "uint256", "name": "totalAmount", "type": "uint256" },
                { "indexed": false, "internalType": "uint256", "name": "recipientCount", "type": "uint256" }
            ],
            "name": "BatchTransferExecuted",
            "type": "event"
        },
        {
            "inputs": [
                { "internalType": "address[]", "name": "recipients", "type": "address[]" },
                { "internalType": "uint256[]", "name": "amounts", "type": "uint256[]" }
            ],
            "name": "sendBatch",
            "outputs": [],
            "stateMutability": "payable",
            "type": "function"
        }
    ];
    
    // Raw EVM Bytecode injected directly from Remix
    const CONTRACT_BYTECODE = "0x6080604052348015600e575f5ffd5b5061081b8061001c5f395ff3fe60806040526004361061001d575f3560e01c80638535d2ec14610021575b5f5ffd5b61003b600480360381019061003691906103f2565b61003d565b005b818190508484905014610085576040517f08c379a000000000000000000000000000000000000000000000000000000000815260040161007c906104ca565b60405180910390fd5b5f5f90505f5f90505b838390508110156100cd578383828181106100ac576100ab6104e8565b5b90506020020135826100be919061054b565b9150808060010191505061008e565b5080341015610111576040517f08c379a0000000000000000000000000000000000000000000000000000000008152600401610108906105c8565b60405180910390fd5b5f5f90505b85859050811015610217575f868683818110610135576101346104e8565b5b905060200201602081019061014a9190610640565b73ffffffffffffffffffffffffffffffffffffffff16858584818110610173576101726104e8565b5b9050602002013560405161018690610698565b5f6040518083038185875af1925050503d805f81146101c0576040519150601f19603f3d011682016040523d82523d5f602084013e6101c5565b606091505b5050905080610209576040517f08c379a0000000000000000000000000000000000000000000000000000000008152600401610200906106f6565b60405180910390fd5b508080600101915050610116565b505f81346102259190610714565b90505f8111156102d9575f3373ffffffffffffffffffffffffffffffffffffffff168260405161025490610698565b5f6040518083038185875af1925050503d805f811461028e576040519150601f19603f3d011682016040523d82523d5f602084013e610293565b606091505b50509050806102d7576040517f08c379a00000000000000000000000000000000000000000000000000000000081526004016102ce90610791565b60405180910390fd5b505b3373ffffffffffffffffffffffffffffffffffffffff167f8903ead3f8a739b2bb84406eae5d8b2f9d93946abc11f7fd5c4a68024d15bd0583888890506040516103249291906107be565b60405180910390a2505050505050565b5f5ffd5b5f5ffd5b5f5ffd5b5f5ffd5b5f5ffd5b5f5f83601f84011261035d5761035c61033c565b5b8235905067ffffffffffffffff81111561037a57610379610340565b5b60208301915083602082028301111561039657610395610344565b5b9250929050565b5f5f83601f8401126103b2576103b161033c565b5b8235905067fffffff 161076f565b9050919050565b6107b881610515565b82525050565b5f6040820190506107d15f8301856107af565b6107de60208301846107af565b939250505056fea2646970667358221220ae13e294be7b9731b523d7f39a98734178edf1c70b49a104375471feaf716c9d64736f6c63430008220033"; 

    async function connectWallet() {
        if (typeof window.ethereum !== 'undefined') {
            try {
                provider = new ethers.BrowserProvider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                signer = await provider.getSigner();
                userAddressStr = await signer.getAddress();
                
                await enforceNetwork();

                document.getElementById('status').innerText = "Status: Connected";
                document.getElementById('userAddress').innerText = "Address: " + userAddressStr;
                document.getElementById('sendBtn').disabled = false;
                document.getElementById('deployBtn').disabled = false;
                document.getElementById('connectBtn').innerText = "Connected";

                document.getElementById('qrcode').innerHTML = "";
                new QRCode(document.getElementById("qrcode"), userAddressStr);

                updateBalance();
                window.ethereum.on('accountsChanged', connectWallet);
                window.ethereum.on('chainChanged', connectWallet);
                setInterval(updateBalance, 10000); 

            } catch (error) {
                console.error("Connection error:", error);
                alert("Connection failed. Please check your extension.");
            }
        } else {
            alert('Please install a Web3 browser extension (MetaMask/OKX) on your mobile browser (like Kiwi or Mises).');
        }
    }

    async function enforceNetwork() {
        const network = await provider.getNetwork();
        if (network.chainId !== 785n) {
            try {
                await window.ethereum.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: autheoNetwork.chainId }],
                });
            } catch (switchError) {
                if (switchError.code === 4902) {
                    await window.ethereum.request({
                        method: 'wallet_addEthereumChain',
                        params: [autheoNetwork],
                    });
                } else {
                    throw switchError;
                }
            }
        }
    }

    async function updateBalance() {
        if (!userAddressStr || !provider) return;
        const balanceWei = await provider.getBalance(userAddressStr);
        const balanceEth = ethers.formatEther(balanceWei);
        document.getElementById('balanceDisplay').innerText = `Balance: ${parseFloat(balanceEth).toFixed(4)} THEO`;
    }

    async function sendTransaction() {
        const toAddress = document.getElementById('recipient').value;
        const amountStr = document.getElementById('amount').value;

        if (!ethers.isAddress(toAddress) || !amountStr) {
            alert("Invalid address or amount");
            return;
        }

        try {
            document.getElementById('sendBtn').innerText = "Processing...";
            document.getElementById('sendBtn').disabled = true;

            const tx = { to: toAddress, value: ethers.parseEther(amountStr) };
            const startTime = Date.now();
            
            const transactionResponse = await signer.sendTransaction(tx);
            const receipt = await transactionResponse.wait();
            
            const endTime = Date.now();
            const timeTook = ((endTime - startTime) / 1000).toFixed(2) + "s";
            
            const gasFeeWei = receipt.gasUsed * receipt.gasPrice;
            const gasFeeTheo = ethers.formatEther(gasFeeWei);

            addLedgerEntry(receipt.hash, timeTook, gasFeeTheo);
            speakConfirmation(`Transfer complete. Sent ${amountStr} THEO.`);
            updateBalance();

        } catch (error) {
            console.error(error);
            alert("Transaction failed or rejected.");
        } finally {
            document.getElementById('sendBtn').innerText = "Send Funds";
            document.getElementById('sendBtn').disabled = false;
        }
    }

    async function deployContract() {
        if (CONTRACT_BYTECODE === "0x...") {
            alert("Developer Error: You must paste the Remix Bytecode into the CONTRACT_BYTECODE variable in index.html first.");
            return;
        }

        try {
            document.getElementById('deployBtn').innerText = "Deploying to Autheo...";
            document.getElementById('deployBtn').disabled = true;

            const startTime = Date.now();
            const factory = new ethers.ContractFactory(CONTRACT_ABI, CONTRACT_BYTECODE, signer);
            
            const contract = await factory.deploy();
            const receipt = await contract.deploymentTransaction().wait();
            const address = await contract.getAddress();

            const endTime = Date.now();
            const timeTook = ((endTime - startTime) / 1000).toFixed(2) + "s";
            const gasFeeWei = receipt.gasUsed * receipt.gasPrice;
            const gasFeeTheo = ethers.formatEther(gasFeeWei);

            document.getElementById('contractAddress').innerHTML = 
                `Deployed Successfully!<br>Address: <a href="https://testnet-explorer.autheo.com/address/${address}" target="_blank" style="color: #58a6ff; word-break: break-all;">${address}</a>`;
            
            addLedgerEntry(receipt.hash, timeTook, gasFeeTheo);
            speakConfirmation("Contract deployment complete.");

        } catch (error) {
            console.error("Deployment Error:", error);
            alert("Contract deployment failed. Check console or ensure you have enough THEO for gas.");
        } finally {
            document.getElementById('deployBtn').innerText = "Deploy BatchSender Contract";
            document.getElementById('deployBtn').disabled = false;
        }
    }

    function addLedgerEntry(hash, time, gas) {
        const table = document.getElementById('ledgerTable');
        const row = table.insertRow(1);
        const shortHash = hash.substring(0, 6) + "..." + hash.substring(hash.length - 4);
        
        row.insertCell(0).innerHTML = `<a href="https://testnet-explorer.autheo.com/tx/${hash}" target="_blank" style="color: #58a6ff;">${shortHash}</a>`;
        row.insertCell(1).innerText = time;
        row.insertCell(2).innerText = parseFloat(gas).toFixed(6) + " THEO";
        row.insertCell(3).innerText = "Success";
    }

    function speakConfirmation(text) {
        if ('speechSynthesis' in window) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1;
            window.speechSynthesis.speak(utterance);
        }
    }
</script>
</body>
</html>
